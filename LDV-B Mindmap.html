// ── SETUP ─────────────────────────────────────────────────────────────────────
const W = window.innerWidth;
const H = window.innerHeight;
const cx = W / 2;
const cy = H / 2;

const svg = d3.select("#mindmap")
  .attr("width", W)
  .attr("height", H);

// Defs: glow filters + gradients
const defs = svg.append("defs");

function addGlow(id, color, stdDev) {
  const f = defs.append("filter").attr("id", id).attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
  f.append("feGaussianBlur").attr("in", "SourceGraphic").attr("stdDeviation", stdDev).attr("result", "blur");
  f.append("feFlood").attr("flood-color", color).attr("flood-opacity", 0.6).attr("result", "color");
  f.append("feComposite").attr("in", "color").attr("in2", "blur").attr("operator", "in").attr("result", "shadow");
  const merge = f.append("feMerge");
  merge.append("feMergeNode").attr("in", "shadow");
  merge.append("feMergeNode").attr("in", "SourceGraphic");
}
addGlow("glow-root", "#00e5ff", 8);
addGlow("glow-cyan", "#00e5ff", 4);
addGlow("glow-amber", "#f59e0b", 4);
addGlow("glow-violet", "#a78bfa", 4);
addGlow("glow-green", "#34d399", 4);
addGlow("glow-orange", "#fb923c", 4);
addGlow("glow-pink", "#f472b6", 4);
addGlow("glow-blue", "#60a5fa", 4);

const glowMap = {
  "#00e5ff": "url(#glow-cyan)",
  "#f59e0b": "url(#glow-amber)",
  "#a78bfa": "url(#glow-violet)",
  "#34d399": "url(#glow-green)",
  "#fb923c": "url(#glow-orange)",
  "#f472b6": "url(#glow-pink)",
  "#60a5fa": "url(#glow-blue)"
};

const outerG = svg.append("g").attr("class", "outer");
const gMain = outerG.append("g").attr("transform", `translate(${cx},${cy})`);

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 4])
  .on("zoom", e => outerG.attr("transform", e.transform));

svg.call(zoom);
svg.call(zoom.transform, d3.zoomIdentity.translate(cx, cy).scale(0.78));

function zoomBy(k) { svg.transition().duration(350).call(zoom.scaleBy, k); }
function resetView() {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(cx, cy).scale(0.78));
}

// ── TREE ──────────────────────────────────────────────────────────────────────
const RADII = [0, 170, 310, 440];

const treeLayout = d3.tree()
  .size([2 * Math.PI, RADII[2]])
  .separation((a, b) => (a.parent === b.parent ? 1 : 1.8) / a.depth);

let uid = 0;

function buildHierarchy(d, parentColor) {
  const color = d.c || parentColor || "#00e5ff";
  const node = {
    name: d.n,
    color,
    children: null,
    _children: null
  };
  if (d.children && d.children.length) {
    node.children = d.children.map(ch => buildHierarchy(ch, color));
  }
  return node;
}

const rootData = buildHierarchy(DATA, "#00e5ff");
rootData.name = DATA.n;
rootData.sub = DATA.sub;

const root = d3.hierarchy(rootData, d => d.children);
root.descendants().forEach(d => { d.uid = ++uid; });

// Collapse depth ≥ 2 initially
root.descendants().forEach(d => {
  if (d.depth >= 2 && d.children) {
    d.data._children = d.children.map(c => c.data);
    d._childrenNodes = d.children;
    d.children = null;
  }
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function radialXY(angle, r) {
  return [r * Math.cos(angle - Math.PI / 2), r * Math.sin(angle - Math.PI / 2)];
}

function getColor(d) {
  return d.data.color || "#00e5ff";
}

function onRight(d) { return d.x < Math.PI; }

// ── RENDER ────────────────────────────────────────────────────────────────────
const linkG = gMain.append("g").attr("class", "links");
const nodeG = gMain.append("g").attr("class", "nodes");

const tooltip = document.getElementById("tooltip");

function showTip(event, d) {
  if (d.depth === 0) return;
  const hasMore = d._childrenNodes && d._childrenNodes.length;
  const hasOpen = d.children && d.children.length;
  let html = d.data.name.replace(/\n/g, "<br>");
  if (hasMore || hasOpen) {
    const count = hasMore ? d._childrenNodes.length : d.children.length;
    html += `<div class="expand-hint">${count} sub-items — click to ${hasOpen ? "collapse" : "expand"}</div>`;
  }
  tooltip.innerHTML = html;
  tooltip.style.opacity = "1";
  tooltip.style.left = (event.clientX + 14) + "px";
  tooltip.style.top = (event.clientY - 8) + "px";
}
function moveTip(event) {
  tooltip.style.left = (event.clientX + 14) + "px";
  tooltip.style.top = (event.clientY - 8) + "px";
}
function hideTip() { tooltip.style.opacity = "0"; }

function toggle(d) {
  if (d._childrenNodes) {
    // Expand: restore children from _childrenNodes
    d.children = d._childrenNodes;
    d._childrenNodes = null;
  } else if (d.children) {
    // Collapse
    d._childrenNodes = d.children;
    d.children = null;
  }
}

function update() {
  treeLayout(root);

  // Fix radii by depth
  root.descendants().forEach(d => {
    const r = RADII[Math.min(d.depth, RADII.length - 1)];
    d.y = r;
  });

  const nodes = root.descendants();
  const links = root.links();

  // ── LINKS
  const linkSel = linkG.selectAll("path.link")
    .data(links, d => `${d.source.uid}-${d.target.uid}`);

  const linkEnter = linkSel.enter().append("path")
    .attr("class", "link")
    .attr("stroke", d => getColor(d.target))
    .attr("stroke-width", d => d.target.depth === 1 ? 2 : 1)
    .attr("opacity", 0)
    .attr("d", d => {
      const [sx, sy] = radialXY(d.source.x, d.source.y);
      return `M${sx},${sy}L${sx},${sy}`;
    });

  linkSel.merge(linkEnter)
    .transition().duration(500).ease(d3.easeCubicInOut)
    .attr("stroke", d => getColor(d.target))
    .attr("stroke-width", d => d.target.depth === 1 ? 2 : 1)
    .attr("opacity", d => d.target.depth === 1 ? 0.55 : 0.25)
    .attr("d", d => {
      const [sx, sy] = radialXY(d.source.x, d.source.y);
      const [tx, ty] = radialXY(d.target.x, d.target.y);
      // Smooth cubic bezier
      const dr = Math.sqrt((tx-sx)**2 + (ty-sy)**2) * 0.5;
      const mx = (sx + tx) / 2;
      const my = (sy + ty) / 2;
      // Control points — pull toward center for depth 1, outward for deeper
      const cf = d.target.depth === 1 ? 0.3 : 0.15;
      const c1x = sx + (mx - sx) * (1 - cf);
      const c1y = sy + (my - sy) * (1 - cf);
      const c2x = tx + (mx - tx) * (1 - cf);
      const c2y = ty + (my - ty) * (1 - cf);
      return `M${sx},${sy}C${c1x},${c1y},${c2x},${c2y},${tx},${ty}`;
    });

  linkSel.exit()
    .transition().duration(400)
    .attr("opacity", 0)
    .remove();

  // ── NODES
  const nodeSel = nodeG.selectAll("g.node")
    .data(nodes, d => d.uid);

  const nodeEnter = nodeSel.enter().append("g")
    .attr("class", "node")
    .attr("transform", d => {
      const parent = d.parent || d;
      const [px, py] = radialXY(parent.x, parent.y);
      return `translate(${px},${py})`;
    })
    .attr("opacity", 0)
    .on("click", (event, d) => {
      event.stopPropagation();
      if (d.depth === 0) return;
      toggle(d);
      update();
    })
    .on("mouseover", (e, d) => showTip(e, d))
    .on("mousemove", moveTip)
    .on("mouseout", hideTip);

  // Root node
  const rootEnter = nodeEnter.filter(d => d.depth === 0);
  rootEnter.append("circle")
    .attr("r", 78)
    .attr("fill", "rgba(0,229,255,0.04)")
    .attr("stroke", "#00e5ff")
    .attr("stroke-width", 1.5)
    .attr("filter", "url(#glow-root)");
  rootEnter.append("circle")
    .attr("r", 62)
    .attr("fill", "rgba(0,229,255,0.035)")
    .attr("stroke", "rgba(0,229,255,0.3)")
    .attr("stroke-width", 0.5)
    .attr("stroke-dasharray", "3 3");
  rootEnter.append("text")
    .attr("text-anchor", "middle")
    .attr("dy", "-0.4em")
    .attr("font-family", "Orbitron, monospace")
    .attr("font-size", "17px")
    .attr("font-weight", "900")
    .attr("fill", "#00e5ff")
    .attr("letter-spacing", "0.12em")
    .text("LDV-B WHP");
  rootEnter.append("text")
    .attr("text-anchor", "middle")
    .attr("dy", "1em")
    .attr("font-size", "8.5px")
    .attr("fill", "rgba(148,163,184,0.5)")
    .attr("letter-spacing", "0.2em")
    .text("BLOCK 15-1/05");
  rootEnter.append("text")
    .attr("text-anchor", "middle")
    .attr("dy", "2.2em")
    .attr("font-size", "7.5px")
    .attr("fill", "rgba(148,163,184,0.3)")
    .attr("letter-spacing", "0.18em")
    .text("MURPHY OIL");

  // Depth-1 nodes (main branches)
  const l1Enter = nodeEnter.filter(d => d.depth === 1);
  l1Enter.append("rect")
    .attr("class", "node-bg")
    .attr("rx", 3)
    .attr("fill", d => `${getColor(d)}14`)
    .attr("stroke", d => getColor(d))
    .attr("stroke-width", 1.5)
    .attr("opacity", 0.8);
  l1Enter.each(function(d) {
    const lines = d.data.name.split("\n");
    const g = d3.select(this);
    const fontSize = 9;
    const lineH = 12;
    const padX = 14, padY = 8;
    const textW = Math.max(...lines.map(l => l.length)) * 5.6;
    const W = textW + padX * 2;
    const H2 = lines.length * lineH + padY * 2;
    g.select("rect")
      .attr("x", -W / 2)
      .attr("y", -H2 / 2)
      .attr("width", W)
      .attr("height", H2);
    lines.forEach((line, i) => {
      const y0 = -((lines.length - 1) * lineH) / 2 + i * lineH;
      g.append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "central")
        .attr("y", y0)
        .attr("font-family", "Orbitron, monospace")
        .attr("font-size", fontSize + "px")
        .attr("font-weight", "600")
        .attr("letter-spacing", "0.06em")
        .attr("fill", d => getColor(d))
        .text(line);
    });
  });

  // Depth-2 nodes
  const l2Enter = nodeEnter.filter(d => d.depth === 2);
  l2Enter.append("circle")
    .attr("r", 5)
    .attr("fill", d => getColor(d))
    .attr("stroke", d => `${getColor(d)}60`)
    .attr("stroke-width", 3)
    .attr("filter", d => glowMap[getColor(d)] || null);
  l2Enter.each(function(d) {
    const g = d3.select(this);
    const lines = d.data.name.split("\n");
    const right = onRight(d);
    const xOff = right ? 12 : -12;
    const anchor = right ? "start" : "end";
    lines.forEach((line, i) => {
      const yo = (i - (lines.length - 1) / 2) * 11;
      g.append("text")
        .attr("text-anchor", anchor)
        .attr("x", xOff)
        .attr("y", yo)
        .attr("dominant-baseline", "central")
        .attr("font-size", "9.5px")
        .attr("fill", d => getColor(d))
        .attr("opacity", 0.9)
        .text(line);
    });
    // expand indicator
    if (d._childrenNodes || d.children) {
      g.append("text")
        .attr("class", "expand-dot")
        .attr("text-anchor", "middle")
        .attr("y", 0)
        .attr("dominant-baseline", "central")
        .attr("font-size", "5px")
        .attr("fill", "rgba(255,255,255,0.4)")
        .text("●");
    }
  });

  // Depth-3 nodes
  const l3Enter = nodeEnter.filter(d => d.depth === 3);
  l3Enter.append("circle")
    .attr("r", 2.5)
    .attr("fill", d => getColor(d))
    .attr("opacity", 0.7);
  l3Enter.each(function(d) {
    const g = d3.select(this);
    const lines = d.data.name.split("\n");
    const right = onRight(d);
    const xOff = right ? 9 : -9;
    const anchor = right ? "start" : "end";
    lines.forEach((line, i) => {
      const yo = (i - (lines.length - 1) / 2) * 10;
      g.append("text")
        .attr("text-anchor", anchor)
        .attr("x", xOff)
        .attr("y", yo)
        .attr("dominant-baseline", "central")
        .attr("font-size", "8.5px")
        .attr("fill", d => getColor(d))
        .attr("opacity", 0.7)
        .text(line);
    });
  });

  // ── TRANSITION all nodes
  const allNodes = nodeSel.merge(nodeEnter);

  allNodes.transition().duration(500).ease(d3.easeCubicInOut)
    .attr("opacity", 1)
    .attr("transform", d => {
      const [x, y] = radialXY(d.x, d.y);
      return `translate(${x},${y})`;
    });

  // Update expand indicator text direction on existing l2 nodes
  allNodes.filter(d => d.depth === 2)
    .selectAll("text")
    .attr("text-anchor", d => onRight(d) ? "start" : "end")
    .attr("x", function(d) {
      const orig = +d3.select(this).attr("x");
      if (orig === 0) return 0;
      return onRight(d) ? Math.abs(orig) : -Math.abs(orig);
    });

  nodeSel.exit()
    .transition().duration(400)
    .attr("opacity", 0)
    .attr("transform", d => {
      const parent = d.parent || d;
      const [px, py] = radialXY(parent.x, parent.y);
      return `translate(${px},${py})`;
    })
    .remove();
}

update();

// Resize
window.addEventListener("resize", () => {
  const W2 = window.innerWidth, H2 = window.innerHeight;
  svg.attr("width", W2).attr("height", H2);
  svg.call(zoom.transform, d3.zoomIdentity.translate(W2/2, H2/2).scale(0.78));
});
</script>
</body>
</html>
